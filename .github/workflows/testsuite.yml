name: Perl testsuite

on:
  push:
    branches: ["*"]
    tags-ignore:
      - "*"
  pull_request:

jobs:

  perl-versions:
    runs-on: ubuntu-latest
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: 5.8
          with-devel: true

  ubuntu:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update -y ||:
          sudo apt-get --no-install-recommends -y install libxml2-dev
      - name: perl -V
        run: perl -V
      - name: Install Dependencies using cpm
        uses: perl-actions/install-with-cpm@v1
        with:
          install: |
            Test::CPAN::Changes
            Test::Pod
            Test::TrailingSpace
            Test::Kwalitee
            Alien::Libxml2
          sudo: true
      # this is insane... coming from author testing
      - run: perl Makefile.PL
      - run: "make docs ||:"
      - run: perl Makefile.PL
      - run: make test
      - run: make disttest

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [ubuntu, perl-versions]
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 0
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 0

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson(needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          apt-get update -y ||:
          apt-get -y --no-install-recommends install libxml2-dev
      - name: perl -V
        run: perl -V
      - name: Install Alien::Libxml2
        uses: perl-actions/install-with-cpanm@v1
        with:
          sudo: false
          install: Alien::Libxml2
      - name: Install Dependencies
        uses: perl-actions/install-with-cpanm@v1
        with:
          sudo: false
          install: |
            XML::NamespaceSupport
            XML::SAX
            XML::SAX::Base
      - run: perl Makefile.PL
      - run: make
      - run: make test
      - run: make install

  macOS:
    name: macOS
    needs: [ubuntu]

    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpanm@v1
        with:
          sudo: true
          install: |
            Alien::Libxml2
            XML::NamespaceSupport
            XML::SAX
            XML::SAX::Base
      - run: perl Makefile.PL
      - run: make
      - run: make test
