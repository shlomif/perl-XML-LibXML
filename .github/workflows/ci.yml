name: ci

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:

  perl-versions:
    runs-on: ubuntu-latest
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: 5.8
          with-devel: true

  author-testing:
    name: "Author testing"
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    steps:
      - name: install libxml2-dev
        run: |
          sudo apt-get update -y ||:
          sudo apt-get --no-install-recommends -y install libxml2-dev
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install deps
        uses: perl-actions/install-with-cpm@v1
        with:
          sudo: true
          cpanfile: ".github/cpanfile"
          args: "--with-develop"
      # author testing: build docs first, then re-run Makefile.PL
      - run: perl Makefile.PL
      - run: "make docs ||:"
      - run: perl Makefile.PL
      - run: make test
      - run: make disttest

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [perl-versions]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson(needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - name: install libxml2-dev
        run: |
          apt-get update -y ||:
          apt-get -y --no-install-recommends install libxml2-dev
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install deps
        uses: perl-actions/install-with-cpm@v1
        with:
          sudo: false
          global: false
          cpanfile: ".github/cpanfile"
      - name: Set PERL5LIB to local lib
        run: echo "PERL5LIB=$(pwd)/local/lib/perl5" >> $GITHUB_ENV
      - run: perl Makefile.PL
      - run: make test
      - run: make install

  macOS:
    name: macOS
    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install deps
        uses: perl-actions/install-with-cpm@v1
        with:
          sudo: true
          cpanfile: ".github/cpanfile"
      - run: perl Makefile.PL
      - run: make test
